curve = instantAccelShotCltCorrCurve, "Instant Accel CLT Multiplier"
		columnLabel = "Coolant", "Multiplier"
		xAxis		=  -40, 150, 10
		yAxis		=  0, 3, 10
		xBins		= instantAccelShotCltCorrBins, coolantTemperature
		yBins		= instantAccelShotCltCorrMult
		gauge		= CLTGauge

curve = etbTargetSlewUpRateCurve, "ETB Max Opening Rate (%/s)"
		columnLabel = "ETB Target (%)", "Max Rate (%/s)"
		xAxis		=  0, 100, 10
		yAxis		=  0, 500, 10
		xBins		= etbTargetSlewOpeningBins, TPSValue
		yBins		= etbTargetSlewMaxUpRate
		gauge		= TPSGauge

curve = etbTargetSlewDownRateCurve, "ETB Max Closing Rate (%/s)"
		columnLabel = "ETB Target (%)", "Max Rate (%/s)"
		xAxis		=  0, 100, 10
		yAxis		=  0, 500, 10
		xBins		= etbTargetSlewOpeningBins, TPSValue
		yBins		= etbTargetSlewMaxDownRate
		gauge		= TPSGauge
